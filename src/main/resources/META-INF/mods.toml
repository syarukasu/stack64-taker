modLoader = "javafml"
loaderVersion = "[47,)"
license = "MIT"

[[mixins]]
config = "stack64_taker.mixins.json"

[[mods]]
modId = "stack64_taker"
version = "${file.jarVersion}"
displayName = "Stack64 Taker"
authors = "syarukasu, Codex"
description = '''
Adds configurable shortcut support for taking a chosen amount from large stacks.
Useful with stack-size-increasing mods such as Bigger Stacks.
'''

[[dependencies.stack64_taker]]
modId = "forge"
mandatory = true
versionRange = "[47,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.stack64_taker]]
modId = "minecraft"
mandatory = true
versionRange = "[1.20.1,1.20.2)"
ordering = "NONE"
side = "BOTH"
